# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3
    steps:
    - uses: actions/checkout@v4
    - name: Install Libmapper
      run: wget https://github.com/libmapper/libmapper/releases/download/2.5.2/libmapper-2.5.2.tar.gz && tar -xzf libmapper*.tar.gz && cd libmapper-2.5.2 && ./configure && make -j4 && make install
    - name: Buildcd
      run: swift build -v
    - name: Run tests
      run: swift test -v
